# Public external monitoring. Keep this repository public so its GitHub Actions
# consumption remains free and the status page can read its own history.
owner: RovxBot
repo: homelab-uptime
user-agent: RovxBot
skipDeleteIssues: true
skipDescriptionUpdate: true
skipTopicsUpdate: true
skipHomepageUpdate: true

sites:
  - name: Homepage
    url: https://homepage.cooked.beer
    type: globalping
    location: sydney
    headers:
      - "Cf-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "Cf-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
  - name: Vaultwarden
    url: https://vault.cooked.beer
    type: globalping
    location: sydney
  - name: Radarr
    url: https://radarr.cooked.beer
    type: globalping
    location: sydney
    headers:
      - "Cf-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "Cf-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
  - name: Sonarr
    url: https://sonarr.cooked.beer
    type: globalping
    location: sydney
    headers:
      - "Cf-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "Cf-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
  - name: Prowlarr
    url: https://prowlarr.cooked.beer
    type: globalping
    location: sydney
    headers:
      - "Cf-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "Cf-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
  - name: SABnzbd
    url: https://sabnzbd.cooked.beer
    type: globalping
    location: sydney
    headers:
      - "Cf-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
      - "Cf-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
  - name: Jellyseerr
    url: https://jellyseerr.cooked.beer
    type: globalping
    location: sydney
  - name: Grimguzzler Registration
    url: https://grimguzzler.cooked.beer
    type: globalping
    location: sydney

status-website:
  # Use GitHub Pages until a dedicated status hostname is configured.
  baseUrl: /homelab-uptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Cooked Beer Homelab Status
  introTitle: "**Cooked Beer homelab status**"
  introMessage: Public service checks run from GitHub Actions. Internal service and cluster health are monitored separately by Gatus in the homelab.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
